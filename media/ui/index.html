<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Local Chat | Kodari Bridge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">💠</span>
                <h1>Gemma 4</h1>
            </div>
            <div class="status-panel">
                <div class="status-item">
                    <span class="label">Local Model</span>
                    <span class="value">gemma4:e4b</span>
                </div>
                <div class="status-item">
                    <span class="label">Status</span>
                    <span class="value online" id="ollama-status">Checking...</span>
                </div>
            </div>
            <div class="settings">
                <button id="clear-chat">채팅 내역 삭제</button>
            </div>
        </aside>

        <main class="chat-interface">
            <header class="chat-header">
                <h2>Local AI Bridge <span class="badge">V1.0</span></h2>
            </header>
            
            <div class="chat-window" id="chat-window">
                <!-- Messages will appear here -->
                <div class="message system">
                    <div class="avatar">🤖</div>
                    <div class="content">반갑습니다, 대표님. Gemma 4 로컬 모델과 대화할 준비가 되었습니다.</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Gemma에게 무엇이든 물어보세요..." rows="1"></textarea>
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
